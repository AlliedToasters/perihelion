name: PR Preview → Ghost Drafts

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'manuscript/**'
      - 'tracking/timestamps.json'
      - 'tracking/variables.json'
      - 'publishing/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment: ghost-preview
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r publishing/requirements.txt

      - name: Find changed chapters
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- manuscript/ | grep '\.md$' | grep -v INDEX.md | tr '\n' ' ' || true)
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Publish drafts to Ghost
        if: steps.changed.outputs.files != ''
        env:
          GHOST_API_URL: ${{ secrets.GHOST_API_URL }}
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
        run: |
          python3 publishing/publish_ghost.py \
            --draft \
            --slug-prefix "pr-${{ github.event.pull_request.number }}-" \
            --pr-tag "pr-${{ github.event.pull_request.number }}" \
            --preview-urls /tmp/preview-urls.json \
            --files ${{ steps.changed.outputs.files }}

      - name: Post preview links
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNum = context.payload.pull_request.number;
            const marker = `<!-- ghost-preview-${prNum} -->`;

            // Read preview manifest
            let previews = [];
            try {
              previews = JSON.parse(fs.readFileSync('/tmp/preview-urls.json', 'utf8'));
            } catch (e) {
              console.log('No preview manifest found, skipping comment.');
              return;
            }

            // Build preview links table
            const rows = previews.map(p => {
              const label = p.chapter_number
                ? `Chapter ${p.chapter_number}: ${p.title}`
                : p.title;
              return `| ${label} | [Preview](${p.preview_url}) |`;
            });

            const body = [
              marker,
              `**Ghost preview drafts published.**`,
              ``,
              `| Chapter | Preview |`,
              `|---------|---------|`,
              ...rows,
              ``,
              `Drafts are tagged \`pr-${prNum}\` and will be cleaned up when this PR is closed.`,
            ].join('\n');

            // Create or update comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: ghost-preview
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r publishing/requirements.txt

      - name: Clean up Ghost drafts
        env:
          GHOST_API_URL: ${{ secrets.GHOST_API_URL }}
          GHOST_ADMIN_API_KEY: ${{ secrets.GHOST_ADMIN_API_KEY }}
        run: |
          python3 publishing/publish_ghost.py \
            --cleanup-tag "pr-${{ github.event.pull_request.number }}"
